{% extends 'nav.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        tr, td{
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Forgot Password</h1>
    <form name="forgot_password" method="post" action="{% url 'forgot_password' %}">
        {% csrf_token %}
        <table>
            <tr>
                <td>Enter Registered Email</td>
                <td><input type="text" name="email"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Get OTP" class="btn btn-primary"></td>
            </tr>
        </table>
    </form>
</body>
</html>

{% endblock %}
