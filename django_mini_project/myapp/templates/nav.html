<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini_Project</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="/">Tops Technologies</a>
            </div>
            <ul class="nav navbar-nav">
                <li class="active"><a href="/">Home</a></li>
                <li class="dropdown"><a class="dropdown-toggle" data-toggle="dropdown" href="#">Cources<span class="caret"></span></a>
                    <ul class="dropdown-menu">
                    <li><a href="#">Python</a></li>
                    <li><a href="#">Java</a></li>
                    <li><a href="#">Php</a></li>
                    </ul>
                </li>
                <li><a href="{% url 'contact'%}">Contact</a></li>
            </ul>
            <ul class="nav navbar-nav navbar-right">
                {% if request.session.email %}
                    <li><a href="{% url 'change_password' %}">Change Password</a></li>
                    <li><a href="{% url 'logout' %}"><span class="glyphicon glyphicon-log-out">Logout({{request.session.fname}})</span></a></li>
                    <a href="{% url 'profile' %}"><img src="{{request.session.profile_picture}}" style="height:45px; width:45px; border-radius: 50%;"></a>
                {% else %}
                    <li><a href="{% url 'signup' %}"><span class="glyphicon glyphicon-user"></span> Sign Up</a></li>
                    <li><a href="{% url 'login' %}"><span class="glyphicon glyphicon-log-in"></span> Login</a></li>
                {% endif %}    
            </ul>
        </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
