{% extends 'nav.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titl>Verify OTP</title>
    <style>
        tr, td{
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Verify OTP</h1>
    {% if msg %}
        {{msg}}
    {% endif %}
    <form name="verify_otp" method="post" action="{% url 'verify_otp' %}">
        {% csrf_token %}
        <table>
            <tr>
                <td>Enter OTP</td>
                <td><input type="number" name="otp"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Verify OTP" class="btn btn-primary"></td>
            </tr>
        </table>
    </form>
</body>
</html>

{% endblock %}
