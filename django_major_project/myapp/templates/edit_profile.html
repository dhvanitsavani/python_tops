{% extends 'header.html' %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
   <head>
      
   </head>
   <body>
      
      <!-- contact section start -->
      <div class="contact_section layout_padding">
         <div class="container">
            <div class="contact_main">
               <h1 class="request_text">Edit Profile</h1>
               <form method="post" action="{% url 'edit_profile' %}" enctype="multipart/form-data">
                {% csrf_token %}
                {% if msg %}
                    <p style="font-size: 14px; color: #c33;">{{msg}}</p>
                {% endif %}
                  <div class="form-group">
                     <input type="text" class="email-bt" value="{{user.fname}}" name="fname">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" value="{{user.lname}}" name="lname">
                  </div>
                  <div class="form-group">
                     <input type="file" name="profile_picture" style="width: calc(100% - 30px);; margin-left: 30px;">
                  </div>
                  <div class="form-group">
                     <input type="number" class="email-bt" value="{{user.mobile}}" name="mobile">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" value="{{user.email}}" name="email" readonly>
                  </div>
                  <div class="form-group">
                     <select name="user_type">
                        <option value="" disabled selected>---Select User Type---</option>
                        {% if user.user_type == 'buyer' %}
                        <option value="buyer" selected>Buyer</option>
                        <option value="seller">Seller</option>
                        {% else %}
                        <option value="buyer">Buyer</option>
                        <option value="seller" selected>Seller</option>
                        {% endif %}
                     </select>
                  </div>
                  <div class="form-group">
                     <input type="submit" value="Update" class="submit_buttons">
                  </div>
               </form>
            </div>
         </div>
      </div>
      <!-- contact section end -->
      
   </body>
</html>

{% endblock %}
