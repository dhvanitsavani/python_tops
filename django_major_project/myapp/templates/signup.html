{% extends 'header.html' %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
   <head>
      
   </head>
   <body>
      
      <!-- contact section start -->
      <div class="contact_section layout_padding">
         <div class="container">
            <div class="contact_main">
               <h1 class="request_text">Signup</h1>
               <form method="post" action="{% url 'signup' %}" enctype="multipart/form-data">
                {% csrf_token %}
                {% if msg %}
                    <p style="font-size: 14px; color: #c33;">{{msg}}</p>
                {% endif %}
                  <div>
                     <select name="user_type" class="form-group">
                        <option value="" disabled selected>---Select User Type---</option>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                     </select>
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="First Name" name="fname">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Last Name" name="lname">
                  </div>
                  <div class="form-group" style="display: flex; flex-direction: row; justify-content: space-around;">
                     <h3>Product Image : </h3>
                     <input type="file" name="profile_picture">  
                  </div>
                  <div class="form-group">
                     <input type="number" class="email-bt" placeholder="Mobile" name="mobile">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Email" name="email">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Password" name="password">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Confirm Password" name="cpassword">
                  </div>
                  <div class="form-group">
                     <input type="submit" value="Signup" class="submit_buttons">
                  </div>
               </form>
            </div>
         </div>
      </div>
      <!-- contact section end -->
      
   </body>
</html>

{% endblock %}
