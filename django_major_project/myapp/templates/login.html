{% extends 'header.html' %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
   <head>
      
   </head>
   <body>
      
      <!-- contact section start -->
      <div class="contact_section layout_padding">
         <div class="container">
            <div class="contact_main">
               <h1 class="request_text">Login</h1>
                {% if msg %}
                   <p style="font-size: 14px; color: #c33;">{{msg}}</p>
                {% endif %}
               <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Email" name="email">
                  </div>
                  <div class="form-group">
                     <input type="text" class="email-bt" placeholder="Password" name="password">
                  </div>
                  <div class="form-group">
                     <input type="submit" value="Login" class="submit_buttons">
                  </div>
                  <div>
                     <a href="{% url 'signup' %}" class="other_a_div">Signup</a>
                     <a href="{% url 'forgot_password' %}" class="other_a_div">Forgot Password</a>
                  </div>
               </form>
            </div>
         </div>
      </div>
      <!-- contact section end -->
      
   </body>
</html>

{% endblock %}
